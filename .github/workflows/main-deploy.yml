name: Main - Deploy Stable Package

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish-main:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Extract Version
        id: prep
        shell: bash
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' src/AbsoluteAlgorithm.Core/AbsoluteAlgorithm.Core.csproj | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Wait for Approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: slalithprasad
          minimum-approvals: 1
          issue-title: "Deploy 'Core' STABLE: ${{ steps.prep.outputs.version }}"
          issue-body: "Final approval required for AbsoluteAlgorithm.Core version ${{ steps.prep.outputs.version }}."

      - name: Build & Pack Stable
        shell: bash
        run: |
          dotnet pack src/AbsoluteAlgorithm.Core/AbsoluteAlgorithm.Core.csproj -c Release -o ./dist \
            /p:PackageId=AbsoluteAlgorithm.Core \
            /p:PackageVersion=${{ steps.prep.outputs.version }}

      - name: Push to NuGet
        shell: bash
        run: |
          dotnet nuget push ./dist/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
